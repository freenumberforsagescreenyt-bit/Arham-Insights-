<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arham Studio | AI Ad Terminal V33</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { 
            --gold: #ffcc00; --bg: #05070a; --card: #11141d; 
            --border: rgba(255, 255, 255, 0.08); --amber: #ff9933;
            --neon-blue: #00f2ff; --success-green: #10b981;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; width: 100vw; -webkit-tap-highlight-color: transparent; }

        .navbar { background: rgba(10, 12, 18, 0.98); backdrop-filter: blur(25px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .menu-trigger { font-size: 1.4rem; color: var(--gold); cursor: pointer; }

        /* --- SIDE MENU --- */
        .side-menu { position: fixed; top: 0; left: -310px; width: 280px; height: 100vh; background: #080a0f; z-index: 2000; transition: 0.5s; border-right: 1px solid var(--border); padding: 30px 20px; overflow-y: auto; }
        .side-menu.active { left: 0; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 1500; }
        .menu-overlay.active { display: block; }
        
        .plat-sec { margin-bottom: 25px; }
        .plat-title { font-size: 0.7rem; font-weight: 800; color: var(--gold); letter-spacing: 2px; display: block; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }
        .plat-item { padding: 12px; font-size: 0.85rem; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 12px; transition: 0.3s; margin-bottom: 4px; }
        .plat-item:hover { background: rgba(255,255,255,0.05); color: var(--neon-blue); }

        .container { padding: 15px; box-sizing: border-box; max-width: 500px; margin: auto; }
        
        #capture-area { background: #000; border-radius: 30px; overflow: hidden; border: 1.5px solid var(--border); }
        .ad-canvas { position: relative; width: 100%; overflow: hidden; background: #000; transition: 0.3s; }
        .canvas-1-1 { aspect-ratio: 1/1; }
        .canvas-9-16 { aspect-ratio: 9/16; max-height: 70vh; }
        .canvas-16-9 { aspect-ratio: 16/9; }

        #p-img-main { position: absolute; width: 70%; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 2; filter: drop-shadow(0 15px 35px rgba(0,0,0,0.8)); transition: 0.3s; pointer-events: none; }
        #p-bg-main { position: absolute; inset: 0; opacity: 0.8; z-index: 1; transition: 0.5s; background-size: cover !important; background-position: center !important; }
        
        .brand-watermark { position: absolute; top: 25px; right: 25px; z-index: 10; display: flex; flex-direction: column; align-items: flex-end; opacity: 0.8; }
        .water-logo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 5px; box-shadow: 0 0 15px rgba(255,204,0,0.3); }
        .water-text { font-size: 0.65rem; letter-spacing: 3px; font-weight: 900; color: #fff; text-transform: uppercase; text-shadow: 2px 2px 5px #000; }

        .ad-footer-attached { background: #000; padding: 25px; border-top: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .footer-grid { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: start; }
        .benefit-tag { font-size: 0.8rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .benefit-list { margin: 0; padding: 0; list-style: none; font-size: 0.85rem; color: #e2e8f0; }
        .benefit-list li { margin-bottom: 5px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .benefit-list i { color: var(--success-green); font-size: 0.8rem; }
        
        .price-tag { background: var(--gold); color: #000; padding: 10px 18px; border-radius: 12px; font-weight: 900; font-size: 1.5rem; box-shadow: 0 4px 15px rgba(255,204,0,0.2); text-align: center; }
        .price-label { font-size: 0.5rem; display: block; text-transform: uppercase; margin-bottom: -4px; opacity: 0.7; }

        .psych-trigger { margin-top: 15px; background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 10px; border: 1px solid rgba(16, 185, 129, 0.3); font-size: 0.75rem; color: var(--success-green); font-weight: 700; text-align: center; }

        .contact-strip { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 18px; display: flex; flex-direction: column; gap: 8px; }
        .contact-label { font-size: 0.7rem; color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .id-row { display: flex; justify-content: space-between; align-items: center; }
        .contact-id { font-size: 0.85rem; color: #fff; font-weight: 700; letter-spacing: 0.5px; text-decoration: none; display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px; flex: 1; justify-content: center; }
        .contact-id i { color: var(--neon-blue); margin-right: 8px; font-size: 1.1rem; }

        .config-card { background: #0f121a; border-radius: 25px; padding: 20px; margin: 20px 0; border: 1px solid var(--border); border-top: 3px solid var(--gold); }
        .control-group { margin-bottom: 15px; text-align: left; }
        .control-group label { font-size: 0.65rem; color: var(--gold); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        select, input { width: 100%; padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: #fff; outline: none; font-size: 0.85rem; box-sizing: border-box; }
        
        .btn-main { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 10px; }
        #loader { display: none; margin: 15px 0; color: var(--neon-blue); font-size: 0.8rem; font-weight: 800; text-align: center; }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleSideMenu()"></div>
    
    <nav class="side-menu" id="side-menu">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <b style="color:var(--gold);">FAST POSTER</b>
            <i class="fa fa-times" onclick="toggleSideMenu()"></i>
        </div>
        
        <div class="plat-sec">
            <span class="plat-title">Instagram / Facebook</span>
            <div class="plat-item" onclick="autoPilot('canvas-1-1', 'instagram')"><i class="fab fa-instagram"></i> Feed Post (1:1)</div>
            <div class="plat-item" onclick="autoPilot('canvas-9-16', 'instagram')"><i class="fab fa-instagram"></i> Reel / Story (9:16)</div>
        </div>

        <div class="plat-sec">
            <span class="plat-title">WhatsApp</span>
            <div class="plat-item" onclick="autoPilot('canvas-9-16', 'whatsapp')"><i class="fab fa-whatsapp"></i> Status Update</div>
        </div>

        <div class="plat-sec">
            <span class="plat-title">YouTube</span>
            <div class="plat-item" onclick="autoPilot('canvas-16-9', 'youtube')"><i class="fab fa-youtube"></i> Thumbnail (16:9)</div>
        </div>
    </nav>

    <nav class="navbar">
        <div class="menu-trigger" onclick="toggleSideMenu()"><i class="fa fa-bars-staggered"></i></div>
        <div style="font-weight: 900;">ARHAM <span style="color:var(--gold)">STUDIO Turbo</span></div>
        <i class="fa fa-bolt" style="color:var(--gold);"></i>
    </nav>

    <div class="container">
        
        <div class="config-card">
            <div class="control-group">
                <label>1. Select Product</label>
                <select id="sel-target" onchange="manualGen()">
                    <option value="Health Care">Health Care</option>
                    <option value="Personal Care">Luxury Care</option>
                    <option value="Agriculture">Biofit Stimrich</option>
                    <option value="Wellness">Naturamore</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>2. Creative Theme</label>
                <select id="sel-theme" onchange="manualGen()">
                    <option value="Luxury_Gold">Royal Gold</option>
                    <option value="Cyber_Neon">Neon Cyber</option>
                    <option value="Professional_Studio">Clean Studio</option>
                </select>
            </div>

            <button class="btn-main" onclick="manualGen()">Fast Build Ad</button>
        </div>

        <div id="loader"><i class="fa fa-spinner fa-spin"></i> TURBO LOADING...</div>

        <div id="capture-area">
            <div id="master-canvas" class="ad-canvas canvas-1-1">
                <div id="p-bg-main"></div>
                <img id="p-img-main" src="" alt="Product" crossorigin="anonymous">
                <div class="brand-watermark">
                    <img src="https://i.ibb.co/N26BWZdY/Screenshot-20260130-221623.jpg" class="water-logo" alt="L" crossorigin="anonymous">
                    <span class="water-text">ARHAM ELITE</span>
                    <span style="font-size:0.3rem; letter-spacing:1.5px; color:var(--gold); font-weight:800;">AI STUDIO ©</span>
                </div>
            </div>

            <div class="ad-footer-attached">
                <div class="footer-grid">
                    <div>
                        <span class="benefit-tag" id="foot-title">Product Name</span>
                        <ul class="benefit-list" id="benefit-list">
                            <li><i class="fa fa-circle-check"></i> High Quality</li>
                            <li><i class="fa fa-circle-check"></i> Certified</li>
                        </ul>
                    </div>
                    <div class="price-tag">
                        <span class="price-label">Price</span>
                        <span id="foot-price">₹000</span>
                    </div>
                </div>
                <div class="psych-trigger">⚡ Special Offer. Buy Now!</div>
                <div class="contact-strip">
                    <div class="id-row">
                        <a href="https://instagram.com/kohli_0310" target="_blank" class="contact-id"><i class="fab fa-instagram"></i> Akash</a>
                        <a href="https://instagram.com/anjalisinghsuman82" target="_blank" class="contact-id"><i class="fab fa-instagram"></i> Anjali</a>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-main" style="background:#fff;" onclick="captureAndShare()" id="share-btn">
            <i class="fa fa-download"></i> SAVE & OPEN SOCIAL APP
        </button>
    </div>

    <script>
        const productData = { 
            "Health Care": { img: "health care.png", price: "₹550", b: ["Immunity Booster", "100% Organic"] }, 
            "Personal Care": { img: "personal care & cosmetics.png", price: "₹290", b: ["Natural Glow", "Chemical Free"] }, 
            "Agriculture": { img: "biofit.png", price: "₹1200", b: ["High Yield", "Organic Soil"] }, 
            "Wellness": { img: "naturamore.png", price: "₹1550", b: ["Daily Nutrition", "Best Seller"] } 
        };
        const themes = ["Luxury_Gold", "Cyber_Neon", "Professional_Studio"];
        let lastSelectedApp = 'instagram';

        function toggleSideMenu() { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        
        function autoPilot(fmt, app) {
            lastSelectedApp = app;
            document.getElementById('master-canvas').className = 'ad-canvas ' + fmt;
            const products = Object.keys(productData);
            document.getElementById('sel-target').value = products[Math.floor(Math.random() * products.length)];
            document.getElementById('sel-theme').value = themes[Math.floor(Math.random() * themes.length)];
            manualGen();
            toggleSideMenu();
        }

        function manualGen() {
            const cat = document.getElementById('sel-target').value;
            const theme = document.getElementById('sel-theme').value;
            const data = productData[cat];
            document.getElementById('foot-title').innerText = cat;
            document.getElementById('foot-price').innerText = data.price;
            document.getElementById('benefit-list').innerHTML = data.b.map(item => `<li><i class="fa fa-circle-check"></i> ${item}</li>`).join('');
            renderStudio(cat, theme);
        }

        function renderStudio(category, theme) {
            const bgEl = document.getElementById('p-bg-main');
            const imgEl = document.getElementById('p-img-main');
            const loader = document.getElementById('loader');
            loader.style.display = "block";
            
            const seed = Math.floor(Math.random()*1000000);
            const ai_url = `https://image.pollinations.ai/prompt/luxury_product_podium_${theme}_8k?width=1080&height=1080&nologo=true&seed=${seed}`;
            
            imgEl.src = productData[category].img;
            const bgImg = new Image();
            bgImg.crossOrigin = "anonymous";
            bgImg.src = ai_url;
            bgImg.onload = () => {
                bgEl.style.backgroundImage = `url('${ai_url}')`;
                loader.style.display = "none";
            };
        }

        async function captureAndShare() {
            const btn = document.getElementById('share-btn');
            const area = document.getElementById('capture-area');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> SAVING...';

            try {
                const canvas = await html2canvas(area, { useCORS: true, scale: 2, backgroundColor: '#000' });
                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                
                // --- DIRECT GALLERY DOWNLOAD ---
                const link = document.createElement('a');
                link.download = `Arham_Ad_${Date.now()}.jpg`;
                link.href = imgData;
                link.click();

                // --- OPEN SOCIAL APP ---
                setTimeout(() => {
                    const urls = {
                        instagram: "https://www.instagram.com/",
                        whatsapp: "whatsapp://",
                        youtube: "https://www.youtube.com/"
                    };
                    window.open(urls[lastSelectedApp] || "https://www.instagram.com/", "_blank");
                }, 1000);

            } catch (err) { alert("Try Again"); }
            finally { btn.innerHTML = '<i class="fa fa-download"></i> SAVE & OPEN SOCIAL APP'; }
        }

        window.onload = () => manualGen();
    </script>
</body>
</html>
